/* ---------- Estado / render ---------- */
let current = 'intro';
let history = [];
let answers = {};

const app = () => document.getElementById('app');
const progressEl = () => document.getElementById('progress');

function setProgress(){
  const pct = current==='intro' ? 0 : Math.min(95, 8 + history.length*8);
  progressEl().style.width = pct + '%';
}

function labelNum(){ return 'Pergunta ' + (history.length+1); }

function render(){
  setProgress();
  const s = STEPS[current];
  let html = '';

  if(s.type==='intro'){
    html = `
      <div class="step max-w-xl">
        <img src="${LOGO}" class="h-9 mb-8" alt="Vitta"/>
        <p class="text-xs font-mono uppercase tracking-widest text-v-blue mb-3">Hospital Digital Vitta</p>
        <h1 class="text-3xl md:text-4xl font-semibold leading-tight mb-4">Acolhimento — Hospital Digital Vitta</h1>
        <p class="text-v-t70 mb-8 leading-relaxed">Para te acolher da melhor forma durante a mudança do seu plano, vamos fazer algumas perguntas rápidas. Leva poucos minutos.</p>
        <button onclick="avancar('nome')" class="bg-v-blue hover:bg-v-blueh text-white font-medium px-8 py-4">Começar</button>
      </div>`;
  }
  else if(s.type==='message'){
    // Tela terminal — apenas mostra a mensagem e oferece voltar ao início
    html = `
      <div class="step max-w-xl">
        <div class="w-12 h-12 bg-v-bluel text-v-blue flex items-center justify-center mb-6 text-2xl">💙</div>
        ${s.title ? `<h2 class="text-2xl md:text-3xl font-semibold leading-snug mb-4">${s.title}</h2>` : ''}
        <p class="preamble text-v-t100 leading-relaxed mb-8">${s.q}</p>
        <div class="flex items-center gap-3">
          <button onclick="reiniciar()" class="bg-v-blue hover:bg-v-blueh text-white font-medium px-7 py-3">Voltar ao início</button>
        </div>
      </div>`;
  }
  else if(s.type==='message-next'){
    // Tela intermediária com texto longo + botão OK (avança sem coletar resposta)
    html = `
      <div class="step max-w-2xl w-full">
        <p class="text-xs font-mono text-v-t50 mb-2">${labelNum()}</p>
        ${s.title ? `<h2 class="text-xl md:text-2xl font-semibold mb-4 text-v-blue">${s.title}</h2>` : ''}
        <div class="preamble text-v-t70 leading-relaxed mb-8">${s.preamble}</div>
        <div class="flex items-center gap-3">
          <button onclick="proximoMsg()" class="bg-v-blue hover:bg-v-blueh text-white font-medium px-7 py-3">Continuar</button>
          <span class="text-xs text-v-t50">pressione <b>Enter ↵</b></span>
        </div>
      </div>`;
  }
  else if(s.type==='message-choice'){
    // Mensagem longa seguida de escolha (Seção 4 — Gestante "Estamos aqui para ajudar!")
    html = `
      <div class="step max-w-2xl w-full">
        <p class="text-xs font-mono text-v-t50 mb-2">${labelNum()}</p>
        ${s.title ? `<h2 class="text-xl md:text-2xl font-semibold mb-4 text-v-blue">${s.title}</h2>` : ''}
        <div class="preamble text-v-t70 leading-relaxed mb-6">${s.preamble}</div>
        <h3 class="text-lg md:text-xl font-semibold leading-snug mb-4">${s.q}</h3>
        <div class="space-y-3">
          ${s.options.map((o,i)=>`
            <button class="opt w-full text-left border border-v-border2 px-5 py-4 hover:border-v-blue hover:bg-v-bluel transition flex items-center gap-3"
              onclick="escolher('${o.go}', ${i})">
              <span class="w-7 h-7 border border-v-border2 flex items-center justify-center text-xs font-mono shrink-0">${String.fromCharCode(65+i)}</span>
              <span>${o.label}</span>
            </button>`).join('')}
        </div>
      </div>`;
  }
  else if(s.type==='choice'){
    html = `
      <div class="step max-w-2xl w-full">
        <p class="text-xs font-mono text-v-t50 mb-2">${labelNum()}</p>
        <h2 class="text-2xl md:text-3xl font-semibold leading-snug mb-6">${s.q}${s.req?' <span class="text-v-blue">*</span>':''}</h2>
        <div class="space-y-3">
          ${s.options.map((o,i)=>`
            <button class="opt w-full text-left border border-v-border2 px-5 py-4 hover:border-v-blue hover:bg-v-bluel transition flex items-center gap-3"
              onclick="escolher('${o.go}', ${i})">
              <span class="w-7 h-7 border border-v-border2 flex items-center justify-center text-xs font-mono shrink-0">${String.fromCharCode(65+i)}</span>
              <span>${o.label}</span>
            </button>`).join('')}
        </div>
      </div>`;
  }
  else {
    // input (text/textarea/cpf/email/tel)
    const isCpf = s.type==='cpf';
    const isTel = s.type==='tel';
    const val = answers[current] ? `value="${(answers[current]+'').replace(/"/g,'&quot;')}"` : '';
    const inputType = s.type==='email' ? 'email' : 'text';
    let field;
    if(s.type==='textarea'){
      field = `<textarea id="inp" rows="3" class="w-full bg-transparent border-b-2 border-v-border2 focus:border-v-blue outline-none text-2xl md:text-3xl py-2 resize-none" placeholder="Digite aqui...">${answers[current]||''}</textarea>`;
    } else if(isCpf){
      field = `<input id="inp" type="text" inputmode="numeric" maxlength="11" ${val} class="w-full bg-transparent border-b-2 border-v-border2 focus:border-v-blue outline-none text-2xl md:text-3xl py-2" placeholder="00000000000"
        oninput="this.value=this.value.replace(/\\D/g,'').slice(0,11)"/>`;
    } else if(isTel){
      field = `<input id="inp" type="tel" inputmode="numeric" ${val} class="w-full bg-transparent border-b-2 border-v-border2 focus:border-v-blue outline-none text-2xl md:text-3xl py-2" placeholder="${s.hint||'Ex.: 11 98765-4321'}"/>`;
    } else {
      field = `<input id="inp" type="${inputType}" ${val} class="w-full bg-transparent border-b-2 border-v-border2 focus:border-v-blue outline-none text-2xl md:text-3xl py-2" placeholder="Digite aqui..."/>`;
    }
    const hint = s.hint && !isTel ? `<p class="text-sm text-v-t50 mt-2">${s.hint}</p>` : '';
    const isSubmit = s.next && s.next()==='SUBMIT';
    html = `
      <div class="step max-w-2xl w-full">
        <p class="text-xs font-mono text-v-t50 mb-2">${labelNum()}</p>
        <h2 class="text-2xl md:text-3xl font-semibold leading-snug mb-6">${s.q}${s.req?' <span class="text-v-blue">*</span>':''}</h2>
        ${field}
        ${hint}
        <p id="err" class="text-sm text-red-600 mt-2 hidden">Por favor, preencha este campo.</p>
        <div class="mt-7 flex items-center gap-3">
          <button onclick="proximo()" class="bg-v-blue hover:bg-v-blueh text-white font-medium px-7 py-3">${isSubmit?'Enviar respostas':'OK'}</button>
          <span class="text-xs text-v-t50">pressione <b>Enter ↵</b></span>
        </div>
      </div>`;
  }
  app().innerHTML = html;

  const inp = document.getElementById('inp');
  if(inp){
    inp.focus();
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter' && (STEPS[current].type!=='textarea' || !e.shiftKey)){
        e.preventDefault(); proximo();
      }
    });
  }
  if(STEPS[current].type==='choice' || STEPS[current].type==='message-choice'){
    document.onkeydown = e=>{
      const s=STEPS[current];
      const i=e.key.toUpperCase().charCodeAt(0)-65;
      if(i>=0 && i<s.options.length){ escolher(s.options[i].go, i); }
      if(e.key==='Escape') voltar();
    };
  } else if(STEPS[current].type==='message-next'){
    document.onkeydown = e=>{
      if(e.key==='Enter'){ e.preventDefault(); proximoMsg(); }
      if(e.key==='Escape') voltar();
    };
  } else {
    document.onkeydown = e=>{ if(e.key==='Escape') voltar(); };
  }
}

function showErr(msg){
  const el = document.getElementById('err');
  if(el){ el.textContent = msg; el.classList.remove('hidden'); }
}

function avancar(id){ history.push(current); current=id; render(); }

function escolher(go, i){
  const s = STEPS[current];
  answers[current] = s.options[i].label;
  if(go==='SUBMIT'){ enviar(); return; }
  history.push(current); current=go; render();
}

function proximoMsg(){
  const s = STEPS[current];
  const nx = s.next();
  if(nx==='SUBMIT'){ enviar(); return; }
  history.push(current); current=nx; render();
}

function proximo(){
  const s = STEPS[current];
  const inp = document.getElementById('inp');
  const v = (inp ? inp.value : '').trim();
  if(s.req && !v){ showErr('Por favor, preencha este campo.'); return; }

  if(s.type==='cpf'){
    const digits = v.replace(/\D/g,'');
    if(digits.length !== 11){ showErr('Informe um CPF válido com 11 dígitos numéricos.'); return; }
    answers[current] = digits;
    const nx = s.next();
    if(nx==='SUBMIT'){ enviar(); return; }
    history.push(current); current=nx; render();
    return;
  }

  if(s.type==='tel'){
    const digits = v.replace(/\D/g,'');
    if(digits.length < 10){ showErr('Informe o telefone com DDD (mínimo 10 dígitos). Ex.: 11 98765-4321'); return; }
  }

  answers[current] = v;
  const nx = s.next();
  if(nx==='SUBMIT'){ enviar(); return; }
  history.push(current); current=nx; render();
}

function voltar(){ if(history.length){ current = history.pop(); render(); } }

function reiniciar(){
  current = 'intro';
  history = [];
  answers = {};
  document.onkeydown = null;
  setProgress();
  render();
}

async function enviar(){
  const payload = { access_key: CONFIG.WEB3FORMS_KEY, subject: 'Novo acolhimento — Hospital Digital Vitta' };
  Object.keys(answers).forEach(k => { if(STEPS[k] && STEPS[k].q) payload[STEPS[k].q] = answers[k]; });
  payload['Enviado em'] = new Date().toLocaleString('pt-BR');
  try{
    await fetch('https://api.web3forms.com/submit', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e){ console.error(e); }

  // Mensagem de fechamento empática por trilha
  const sit = (answers.situacao || '').toLowerCase();
  const c = 'Caso precise de algum apoio, pode nos acionar através do 11 49493-6663 ou através do sac@vitta.me';
  let msg = `Nossa equipe vai dar sequência e entrar em contato pelo canal informado. 💙<br><br>${c}`;
  if(sit.includes('gestante'))         msg = `Desejamos que seu parto seja tranquilo, seguro e cheio de amor. 💙<br><br>${c}`;
  else if(sit.includes('cirurgia'))    msg = `Desejamos que tudo corra muito bem e que sua recuperação seja leve e tranquila. 💙<br><br>${c}`;
  else if(sit.includes('tratamento'))  msg = `Estamos aqui para garantir que sua jornada de cuidado continue com toda a atenção que você merece. 💙<br><br>${c}`;
  else if(sit.includes('medicamento')) msg = `Sua saúde é nossa prioridade e faremos o possível para que nada seja interrompido. 💙<br><br>${c}`;
  else if(sit.includes('internado'))   msg = `Nesse momento o mais importante é o seu bem-estar. Pode contar com a gente. 💙<br><br>${c}`;

  current = '__fim';
  document.onkeydown = null;
  progressEl().style.width = '100%';
  app().innerHTML = `
    <div class="step max-w-xl text-center mx-auto">
      <img src="${LOGO}" class="h-9 mb-8 mx-auto" alt="Vitta"/>
      <div class="w-14 h-14 bg-v-blue text-white flex items-center justify-center mx-auto mb-6 text-2xl">✓</div>
      <h1 class="text-2xl md:text-3xl font-semibold mb-3">Recebemos a sua solicitação!</h1>
      <p class="text-v-t70 leading-relaxed">${msg}</p>
      <button onclick="reiniciar()" class="mt-8 text-sm text-v-blue hover:text-v-blueh underline">Voltar ao início</button>
    </div>`;
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape' && current!=='intro' && current!=='__fim') voltar(); });
window.addEventListener('DOMContentLoaded', render);
</script>

<!-- Barra de progresso -->
<div class="fixed top-0 left-0 right-0 h-1 bg-v-border z-30">
  <div id="progress" class="h-full bg-v-blue transition-all duration-300" style="width:0%"></div>
</div>

<!-- Topo: logo + voltar -->
<header class="max-w-5xl w-full mx-auto px-6 pt-6 flex items-center justify-between">
  <img src="https://s3-sa-east-1.amazonaws.com/cdn.mkt.vitta.com.br/logo_assinatura.png" class="h-6" alt="Vitta"/>
  <button onclick="voltar()" class="text-sm text-v-t50 hover:text-v-blue">← Voltar</button>
</header>

<!-- Conteúdo -->
<main class="flex-1 flex items-center">
  <div id="app" class="max-w-5xl w-full mx-auto px-6 py-10"></div>
</main>

<footer class="max-w-5xl w-full mx-auto px-6 py-5 text-xs text-v-t50 border-t border-v-border">
  Hospital Digital Vitta — Acolhimento
</footer>
</body>
</html>
