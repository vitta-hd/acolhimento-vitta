<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acolhimento • Hospital Digital Vitta</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans:['"IBM Plex Sans"','system-ui','sans-serif'], mono:['"IBM Plex Mono"','monospace'] },
    borderRadius: { none:'0', DEFAULT:'0', sm:'0', md:'0', lg:'0', xl:'0', '2xl':'0', full:'9999px' },
    colors: { v:{ blue:'#0a4dbe', blueh:'#083a91', blued:'#0a3f8f', bluel:'#e9f0fb',
                  t100:'#161616', t70:'#525252', t50:'#6f6f6f', border:'#e0e0e0', border2:'#c6c6c6', bg:'#ffffff' } }
  }}}
</script>
<style>
  html,body{font-family:'IBM Plex Sans',sans-serif;color:#161616;background:#fff;}
  .step{animation:slide .35s cubic-bezier(.2,.7,.2,1);}
  @keyframes slide{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .opt:focus{outline:none;border-color:#0a4dbe;background:#e9f0fb;}
  input,textarea{caret-color:#0a4dbe;}
  ::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:#c6c6c6}
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- ============================================================
  CONFIGURAÇÃO — onde salvar as respostas
  Deixe ENDPOINT vazio para testar (as respostas aparecem no console
  do navegador e podem ser baixadas). Para gravar numa planilha Google:
   1. Crie uma planilha no Google (com sua conta).
   2. Extensões > Apps Script, cole o código abaixo e troque SHEET_ID.
   3. Implantar > Nova implantação > App da Web > Qualquer pessoa.
   4. Copie a URL /exec e cole em ENDPOINT.

   function doPost(e){
     var sh = SpreadsheetApp.openById('SHEET_ID').getSheets()[0];
     var d = e.parameter;
     var keys = Object.keys(d);
     if(sh.getLastRow()===0){ sh.appendRow(keys); }
     sh.appendRow(keys.map(function(k){return d[k];}));
     return ContentService.createTextOutput('ok');
   }
============================================================ -->
<script>
// ====== COLE AQUI A SUA CHAVE DO WEB3FORMS ======
// 1) Acesse https://web3forms.com  2) digite seu e-mail  3) copie a "Access Key"
// 4) cole a chave entre as aspas abaixo:
const CONFIG = { WEB3FORMS_KEY: "COLE_SUA_ACCESS_KEY_AQUI" };
// =================================================
const LOGO = "https://s3-sa-east-1.amazonaws.com/cdn.mkt.vitta.com.br/logo_assinatura.png";

const MSG_OK = "Perfeito! Você poderá confirmar com seu médico/hospital a aceitação do seu plano. Assim que o novo plano estiver disponível, ele poderá solicitar os processos, atendimentos e procedimentos na nossa rede credenciada.";
const MSG_PARC = "Ótimo! Assim que o novo plano estiver disponível, basta solicitar os processos, atendimentos e procedimentos na nossa rede credenciada.";
const MSG_INT_OK = "Perfeito! Você poderá confirmar com o hospital/clínica a aceitação do seu plano. Assim que o novo plano estiver disponível, ele poderá solicitar os processos, atendimentos e procedimentos na nossa rede credenciada.";
const MSG_ELET = "Como o seu plano está passando por alteração, é necessário entrar em contato com o local onde sua consulta ou exame está agendado para confirmar se aceitam o novo plano. Caso aceitem, basta aguardar a carteirinha do novo plano e apresentá-la no dia do atendimento (ou enviar com antecedência para garantir a autorização). Se o local não aceitar o novo plano, será preciso aguardar a ativação do app e verificar a nova rede credenciada para ser atendido em outro local. Nesse caso, não cabe acolhimento por parte da Vitta, sendo você o responsável por seguir com as orientações acima.";

const STEPS = {
  intro:    {type:'intro'},
  nome:     {type:'text',  q:'Qual o nome completo do beneficiário?', req:true, next:()=>'cpf'},
  cpf:      {type:'text',  q:'Qual o CPF do beneficiário?', req:true, next:()=>'email'},
  email:    {type:'email', q:'Qual o seu e-mail?', req:true, next:()=>'telefone'},
  telefone: {type:'tel',   q:'Qual o seu telefone?', req:true, next:()=>'canal'},
  canal:    {type:'text',  q:'Qual o melhor canal e horário para contato?', req:true, next:()=>'situacao'},
  situacao: {type:'choice', q:'Qual das opções abaixo descreve melhor a sua situação para acolhimento?',
    options:[
      {label:'Estou gestante', go:'g_verif'},
      {label:'Tenho cirurgia ou procedimento cirúrgico agendado', go:'c_verif'},
      {label:'Faço tratamento ou acompanhamento contínuo pelo convênio', go:'t_verif'},
      {label:'Faço uso de medicamento contínuo ou exames pelo convênio', go:'m_qual'},
      {label:'Estou internado(a) ou em home care', go:'i_verif'},
      {label:'Tenho consultas/exames eletivos agendados (ex.: FIV, odontológico)', go:'f_msg'},
    ]},

  // Gestante
  g_verif:{type:'choice', q:'Você já verificou com seu médico e com o hospital/maternidade se ambos aceitam o novo plano?',
    options:[
      {label:'Sim, e ambos já aceitam o novo plano', go:'msg_ok'},
      {label:'Sim, mas um deles ainda não aceita', go:'msg_parc'},
      {label:'Ainda não verifiquei / o novo plano ainda não está disponível', go:'g_semanas'},
    ]},
  g_semanas:{type:'text', q:'Com quantas semanas de gestação você está?', next:()=>'g_hosp'},
  g_hosp:{type:'text', q:'Em qual hospital/maternidade e com qual médico o parto está agendado?', next:()=>'g_pref'},
  g_pref:{type:'text', q:'Você tem alguma outra preferência de médico, maternidade ou bairro?', next:()=>'g_data'},
  g_data:{type:'text', q:'O parto está previsto para quando?', next:()=>'g_info'},
  g_info:{type:'textarea', q:'Há mais alguma informação importante para localizarmos um novo profissional?', next:()=>'SUBMIT'},

  // Cirurgia
  c_verif:{type:'choice', q:'Você já verificou com seu médico e hospital se aceitam o novo plano?',
    options:[
      {label:'Sim, e ambos já aceitam o novo plano', go:'msg_ok'},
      {label:'Sim, mas um deles ainda não aceita', go:'msg_parc'},
      {label:'Ainda não verifiquei / o novo plano ainda não está disponível', go:'c_qual'},
    ]},
  c_qual:{type:'text', q:'Qual cirurgia/procedimento está agendado e para quando?', next:()=>'c_hosp'},
  c_hosp:{type:'text', q:'Em qual hospital e com qual médico?', next:()=>'c_pref'},
  c_pref:{type:'text', q:'Caso seu médico/hospital não aceite o novo plano, você tem outra preferência de médico, hospital ou bairro?', next:()=>'c_doc'},
  c_doc:{type:'textarea', q:'Pode enviar o pedido médico ou documentos? Cole um link ou descreva (também aceitamos por WhatsApp/e-mail).', next:()=>'c_info'},
  c_info:{type:'textarea', q:'Deseja trazer mais alguma informação?', next:()=>'SUBMIT'},

  // Tratamento contínuo
  t_verif:{type:'text', q:'Você já verificou com seu médico/hospital se aceitam o novo plano?', next:()=>'t_qual'},
  t_qual:{type:'text', q:'Qual tratamento você realiza hoje?', next:()=>'t_data'},
  t_data:{type:'text', q:'Qual a data do próximo tratamento?', next:()=>'t_local'},
  t_local:{type:'text', q:'Em qual hospital ou com qual médico você realiza o tratamento?', next:()=>'t_doc'},
  t_doc:{type:'textarea', q:'Pode enviar o pedido médico ou documentos do tratamento? (link / WhatsApp / e-mail)', next:()=>'t_info'},
  t_info:{type:'textarea', q:'Deseja trazer mais alguma informação?', next:()=>'SUBMIT'},

  // Medicamento
  m_qual:{type:'text', q:'Qual medicamento você toma?', next:()=>'m_local'},
  m_local:{type:'text', q:'Em qual local você retira a medicação?', next:()=>'m_data'},
  m_data:{type:'text', q:'Qual a data da próxima medicação?', next:()=>'m_doc'},
  m_doc:{type:'textarea', q:'Consegue anexar a receita/comprovante? (link / WhatsApp / e-mail)', next:()=>'m_info'},
  m_info:{type:'textarea', q:'Deseja trazer mais alguma informação?', next:()=>'SUBMIT'},

  // Internado / home care
  i_verif:{type:'choice', q:'Você já verificou com o hospital/clínica se aceitam o novo plano?',
    options:[
      {label:'Sim, e o hospital/clínica já aceita o novo plano', go:'msg_int_ok'},
      {label:'Sim, mas ainda não aceita', go:'msg_parc'},
      {label:'Ainda não verifiquei / o novo plano ainda não está disponível', go:'i_hosp'},
    ]},
  i_hosp:{type:'text', q:'Em qual hospital você está internado(a) ou está em home care?', next:()=>'i_motivo'},
  i_motivo:{type:'textarea', q:'Qual o motivo da internação ou do home care? (se tiver relatório/exames, cole um link)', next:()=>'i_info'},
  i_info:{type:'textarea', q:'Deseja trazer mais alguma informação?', next:()=>'SUBMIT'},

  // Mensagens terminais
  msg_ok:{type:'message', q:MSG_OK},
  msg_parc:{type:'message', q:MSG_PARC},
  msg_int_ok:{type:'message', q:MSG_INT_OK},
  f_msg:{type:'message', q:MSG_ELET},
};

let current = 'intro';
let history = [];
let answers = {};

const app = () => document.getElementById('app');
const progressEl = () => document.getElementById('progress');

function setProgress(){
  // heurística simples: avança conforme a navegação
  const pct = current==='intro'?0 : Math.min(95, 10 + history.length*9);
  progressEl().style.width = (current==='intro'?0:pct)+'%';
}

function render(){
  setProgress();
  const s = STEPS[current];
  let html = '';
  if(s.type==='intro'){
    html = `
      <div class="step max-w-xl">
        <img src="${LOGO}" class="h-9 mb-8" alt="Vitta"/>
        <p class="text-xs font-mono uppercase tracking-widest text-v-blue mb-3">Hospital Digital Vitta</p>
        <h1 class="text-3xl md:text-4xl font-semibold leading-tight mb-4">Acolhimento de beneficiários</h1>
        <p class="text-v-t70 mb-8 leading-relaxed">Para te acolher da melhor forma durante a mudança do seu plano, vamos fazer algumas perguntas rápidas. Leva poucos minutos.</p>
        <button onclick="avancar('nome')" class="bg-v-blue hover:bg-v-blueh text-white font-medium px-8 py-4">Começar</button>
      </div>`;
  } else if(s.type==='message'){
    html = `
      <div class="step max-w-xl">
        <div class="w-12 h-12 bg-v-bluel text-v-blue flex items-center justify-center mb-6 text-2xl">✓</div>
        <p class="text-xl md:text-2xl leading-relaxed text-v-t100 mb-8">${s.q}</p>
        <button onclick="enviar()" class="bg-v-blue hover:bg-v-blueh text-white font-medium px-8 py-4">Enviar respostas</button>
      </div>`;
  } else if(s.type==='choice'){
    html = `
      <div class="step max-w-2xl w-full">
        <p class="text-xs font-mono text-v-t50 mb-2">${labelNum()}</p>
        <h2 class="text-2xl md:text-3xl font-semibold leading-snug mb-6">${s.q}</h2>
        <div class="space-y-3">
          ${s.options.map((o,i)=>`
            <button class="opt w-full text-left border border-v-border2 px-5 py-4 hover:border-v-blue hover:bg-v-bluel transition flex items-center gap-3"
              onclick="escolher('${o.go}', ${i})">
              <span class="w-7 h-7 border border-v-border2 flex items-center justify-center text-xs font-mono shrink-0">${String.fromCharCode(65+i)}</span>
              <span>${o.label}</span>
            </button>`).join('')}
        </div>
      </div>`;
  } else {
    const val = answers[current] ? `value="${(answers[current]+'').replace(/"/g,'&quot;')}"` : '';
    const field = s.type==='textarea'
      ? `<textarea id="inp" rows="3" class="w-full bg-transparent border-b-2 border-v-border2 focus:border-v-blue outline-none text-2xl md:text-3xl py-2 resize-none" placeholder="Digite aqui...">${answers[current]||''}</textarea>`
      : `<input id="inp" type="${s.type==='email'?'email':s.type==='tel'?'tel':'text'}" ${val} class="w-full bg-transparent border-b-2 border-v-border2 focus:border-v-blue outline-none text-2xl md:text-3xl py-2" placeholder="Digite aqui..."/>`;
    const isSubmit = s.next && s.next()==='SUBMIT';
    html = `
      <div class="step max-w-2xl w-full">
        <p class="text-xs font-mono text-v-t50 mb-2">${labelNum()}</p>
        <h2 class="text-2xl md:text-3xl font-semibold leading-snug mb-6">${s.q}${s.req?' <span class="text-v-blue">*</span>':''}</h2>
        ${field}
        <p id="err" class="text-sm text-red-600 mt-2 hidden">Por favor, preencha este campo.</p>
        <div class="mt-7 flex items-center gap-3">
          <button onclick="proximo()" class="bg-v-blue hover:bg-v-blueh text-white font-medium px-7 py-3">${isSubmit?'Enviar':'OK'}</button>
          <span class="text-xs text-v-t50">pressione <b>Enter ↵</b></span>
        </div>
      </div>`;
  }
  app().innerHTML = html;
  const inp = document.getElementById('inp');
  if(inp){ inp.focus(); inp.addEventListener('keydown', e=>{ if(e.key==='Enter' && (s.type!=='textarea' || !e.shiftKey)){ e.preventDefault(); proximo(); } }); }
  if(s.type==='choice'){ document.onkeydown = e=>{ const i=e.key.toUpperCase().charCodeAt(0)-65; if(i>=0 && i<s.options.length){ escolher(s.options[i].go,i); } }; }
  else { document.onkeydown=null; }
}

function labelNum(){ return 'Pergunta ' + (history.length+1); }

function avancar(id){ history.push(current); current=id; render(); }
function escolher(go, i){
  const s=STEPS[current];
  answers[current] = s.options[i].label;
  if(go==='SUBMIT'){ enviar(); return; }
  history.push(current); current=go; render();
}
function proximo(){
  const s=STEPS[current];
  const inp=document.getElementById('inp');
  const v=(inp?inp.value:'').trim();
  if(s.req && !v){ document.getElementById('err').classList.remove('hidden'); return; }
  answers[current]=v;
  const nx=s.next();
  if(nx==='SUBMIT'){ enviar(); return; }
  history.push(current); current=nx; render();
}
function voltar(){ if(history.length){ current=history.pop(); render(); } }

async function enviar(){
  const payload={ access_key: CONFIG.WEB3FORMS_KEY, subject: "Novo acolhimento — Hospital Digital Vitta" };
  Object.keys(answers).forEach(k=>{ if(STEPS[k] && STEPS[k].q) payload[STEPS[k].q]=answers[k]; });
  payload['Enviado em']=new Date().toLocaleString('pt-BR');
  try{
    await fetch('https://api.web3forms.com/submit',{method:'POST',
      headers:{'Content-Type':'application/json', Accept:'application/json'},
      body:JSON.stringify(payload)});
  }catch(e){ console.error(e); }
  current='__fim'; document.onkeydown=null; setProgress2(100);
  app().innerHTML = `
    <div class="step max-w-xl text-center mx-auto">
      <img src="${LOGO}" class="h-9 mb-8 mx-auto" alt="Vitta"/>
      <div class="w-14 h-14 bg-v-blue text-white flex items-center justify-center mx-auto mb-6 text-2xl">✓</div>
      <h1 class="text-2xl md:text-3xl font-semibold mb-3">Recebemos o seu acolhimento!</h1>
      <p class="text-v-t70">Obrigado pelas informações. Nossa equipe vai dar sequência e entrar em contato pelo canal informado. 💙</p>
    </div>`;
}
function setProgress2(p){ progressEl().style.width=p+'%'; }

document.addEventListener('keydown', e=>{ if(e.key==='Escape') voltar(); });
window.addEventListener('DOMContentLoaded', render);
</script>

<!-- Barra de progresso -->
<div class="fixed top-0 left-0 right-0 h-1 bg-v-border z-30">
  <div id="progress" class="h-full bg-v-blue transition-all duration-300" style="width:0%"></div>
</div>

<!-- Topo: logo + voltar -->
<header class="max-w-5xl w-full mx-auto px-6 pt-6 flex items-center justify-between">
  <img src="https://s3-sa-east-1.amazonaws.com/cdn.mkt.vitta.com.br/logo_assinatura.png" class="h-6" alt="Vitta"/>
  <button onclick="voltar()" class="text-sm text-v-t50 hover:text-v-blue">← Voltar</button>
</header>

<!-- Conteúdo -->
<main class="flex-1 flex items-center">
  <div id="app" class="max-w-5xl w-full mx-auto px-6 py-10"></div>
</main>

<footer class="max-w-5xl w-full mx-auto px-6 py-5 text-xs text-v-t50 border-t border-v-border">
  ESPM | Hospital Digital Vitta — Acolhimento
</footer>
</body>
</html>
